<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Web Install Sample in an IFrame</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="../style.css"/>
  </head>
  <body>
    <h2>kbhlee2121 iframe</h2>
    <p>Executes:</p>
    <pre><code>
      let install_url = "https://mustjab.github.io/";
      navigator.install(install_url);
    </code></pre>
    <button id="framedApi">Install</button>
    <p>Executes:</p>
    <pre><code>
      &lt;install installurl="https://mustjab.github.io/"&gt;&lt;/install&gt;
    </code></pre>
    <install installurl="https://mustjab.github.io/" id="framedElement"></install>

    <p>Executes:</p>
    <pre><code>
      &lt;geolocation&gt;&lt;/geolocation&gt;
    </code></pre>
    <geolocation onlocation="console.log('Location updated');"></geolocation>

    <script>
    // Feature detection.
    if (!navigator.install) {
      console.error("navigator.install is not available.");
    }

    // Same-origin with 2 params.
    document.getElementById("framedApi").addEventListener("click", async () => {
      try {
        let install_url = "https://mustjab.github.io/";
        await navigator.install(install_url).then((result) => {
          console.log(result);
        });
      } catch (err) {
        console.error(err);
      }
    });

    // Listen for validation status changes.
    document.getElementById("framedElement").onvalidationstatuschange = (event) => {
      console.log(`framedElement - validationstatuschange:`, {
        valid: event.target.isValid,
        invalidReason: event.target.invalidReason,
        event: event
      });
    };
  </script>
  <script src="elements-app.js"></script>
</html>
