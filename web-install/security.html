<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Web Install Security Playground</title>
    <link rel="stylesheet" href="../style.css"/>
  </head>
  <body>
    <h1>Web Install Security Playground</h1>

    <button id="loadIframeBtn" type="button">Load iframe</button>
    <button id="loadCrossOriginIframeBtn" type="button">Load cross-origin iframe</button>
    <button id="loadSandboxedIframeBtn" type="button">Load sandboxed iframe</button>
    <button id="loadFencedFrameBtn" type="button">Load fenced frame</button>
    <div id="iframeHost"></div>
    <div id="crossOriginIframeHost"></div>
    <div id="sandboxedIframeHost"></div>
    <div id="fencedFrameHost"></div>

    <script>
      const loadIframeBtn = document.getElementById('loadIframeBtn');
      const iframeHost = document.getElementById('iframeHost');

      loadIframeBtn.addEventListener('click', () => {
        if (iframeHost.querySelector('iframe')) {
          return;
        }

        const iframe = document.createElement('iframe');
        iframe.src = 'https://kbhlee2121.github.io/pwa/web-install/iframe.html';
        iframe.width = 800;
        iframe.height = 800;
        iframeHost.appendChild(iframe);
      });

      const loadCrossOriginIframeBtn = document.getElementById('loadCrossOriginIframeBtn');
      const crossOriginIframeHost = document.getElementById('crossOriginIframeHost');

      loadCrossOriginIframeBtn.addEventListener('click', () => {
        if (crossOriginIframeHost.querySelector('iframe')) {
          return;
        }

        const iframe = document.createElement('iframe');
        iframe.src = 'https://liahiscock.github.io/PWA/WebInstall/index.html';
        iframe.width = 800;
        iframe.height = 800;
        crossOriginIframeHost.appendChild(iframe);
      });

      const loadSandboxedIframeBtn = document.getElementById('loadSandboxedIframeBtn');
      const sandboxedIframeHost = document.getElementById('sandboxedIframeHost');

      loadSandboxedIframeBtn.addEventListener('click', () => {
        if (sandboxedIframeHost.querySelector('iframe')) {
          return;
        }

        const iframe = document.createElement('iframe');
        iframe.src = 'https://kbhlee2121.github.io/pwa/web-install/iframe.html';
        iframe.setAttribute('sandbox', 'allow-scripts');
        iframe.width = 800;
        iframe.height = 800;
        sandboxedIframeHost.appendChild(iframe);
      });

      const loadFencedFrameBtn = document.getElementById('loadFencedFrameBtn');
      const fencedFrameHost = document.getElementById('fencedFrameHost');

      loadFencedFrameBtn.addEventListener('click', () => {
        if (fencedFrameHost.querySelector('fencedframe')) {
          return;
        }

        const fencedFrame = document.createElement('fencedframe');
        const config = new FencedFrameConfig('https://kbhlee2121.github.io/pwa/web-install/index.html');
        fencedFrame.config = config;
        fencedFrame.width = 800;
        fencedFrame.height = 800;
        fencedFrameHost.appendChild(fencedFrame);
      });
    </script>
  </body>
</html>
