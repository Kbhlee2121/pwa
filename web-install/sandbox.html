<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Sandboxed Web Install Sample</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="../style.css"/>
    <meta http-equiv="Content-Security-Policy" content="sandbox">
  </head>
  <body>
    <h2>Install same-origin with preset id</h2>
    <p>Executes:</p>
    <pre><code>
      let manifest_id = "https://kbhlee2121.github.io/pwa/web-install/index.html";
      let install_url = manifest_id;
      navigator.install(install_url, manifest_id);
    </code></pre>
    <button id="installSameOriginTwoParams">Install</button>
    <p>Executes:</p>
    <pre><code>
      &lt;install installurl="https://mustjab.github.io/"&gt;&lt;/install&gt;
    </code></pre>
    <install installurl="https://mustjab.github.io/"></install>
  </body>
  <script src="app.js"></script>
</html>
